<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Slider</title>
</head>
<body>
<script>
 
  const style = document.createElement('style');
  style.textContent = `
  * {box-sizing: border-box}
  body {font-family: Verdana, sans-serif; margin:0}
  .mySlides {display: none;}
  img {vertical-align: middle; width: 100%;}
  .slideshow-container {
    max-width: 1000px;
    position: relative;
    margin: auto;
  }
  .prev, .next {
    cursor: pointer;
    position: absolute;
    top: 50%;
    width: auto;
    padding: 16px;
    margin-top: -22px;
    color: white;
    font-weight: bold;
    font-size: 18px;
    transition: 0.6s ease;
    border-radius: 0 3px 3px 0;
    user-select: none;
    background-color: rgba(0,0,0,0.3);
  }
  .next {
    right: 0;
    border-radius: 3px 0 0 3px;
  }
  .prev:hover, .next:hover {
    background-color: rgba(0,0,0,0.8);
  }
  .text {
    color: #f2f2f2;
    font-size: 15px;
    padding: 8px 12px;
    position: absolute;
    bottom: 8px;
    width: 100%;
    text-align: center;
  }
  .numbertext {
    color: #f2f2f2;
    font-size: 12px;
    padding: 8px 12px;
    position: absolute;
    top: 0;
  }
  .dot {
    cursor: pointer;
    height: 20px;
    width: 20px;
    margin: 10px 3px;
    background-color: #bbb;
    border-radius: 50%;
    display: inline-block;
    transition: background-color 0.6s ease;
  }
  .active, .dot:hover {
    background-color: #717171;
  }
  @keyframes fade {
    from {opacity: .4}
    to {opacity: 1}
  }
  .fade {
    animation-name: fade;
    animation-duration: 1.5s;
  }
  img{
  height:60vh;
  }

`;
  document.head.appendChild(style);
  const container = document.createElement('div');
  container.className = 'slideshow-container';

  const slidesData = [
    { src: 'images/img_01.jpg', caption: 'Caption one' },
    { src: 'images/img_02.jpg', caption: 'Caption Two' },
    { src: 'images/img_03.jpeg', caption: 'Caption Three' },
  ];


  slidesData.forEach((slide, index) => {
    const slideDiv = document.createElement('div');
    slideDiv.className = 'mySlides fade';

    const numberText = document.createElement('div');
    numberText.className = 'numbertext';
    numberText.textContent = `${index + 1} / ${slidesData.length}`;
    slideDiv.appendChild(numberText);

    const img = document.createElement('img');
    img.src = slide.src;
    slideDiv.appendChild(img);

    const caption = document.createElement('div');
    caption.className = 'text';
    caption.textContent = slide.caption;
    slideDiv.appendChild(caption);
    container.appendChild(slideDiv);
  });

  const prev = document.createElement('a');
  prev.className = 'prev';
  prev.textContent = '❮';
  container.appendChild(prev);

  const next = document.createElement('a');
  next.className = 'next';
  next.textContent = '❯';
  container.appendChild(next);
  document.body.appendChild(container);

  const dotsContainer = document.createElement('div');
  dotsContainer.style.textAlign = 'center';

  slidesData.forEach((_, i) => {
    const dot = document.createElement('span');
    dot.className = 'dot';
    dot.addEventListener('click', () => currentSlide(i + 1));
    dotsContainer.appendChild(dot);
  });

  document.body.appendChild(dotsContainer);


  let slideIndex = 1;
  showSlides(slideIndex);

  prev.addEventListener('click', () => plusSlides(-1));
  next.addEventListener('click', () => plusSlides(1));

  function plusSlides(n) {
    showSlides(slideIndex += n);
  }

  function currentSlide(n) {
    showSlides(slideIndex = n);
  }

  function showSlides(n) {
    let i;
    const slides = document.getElementsByClassName('mySlides');
    const dots = document.getElementsByClassName('dot');
    if (n > slides.length) { slideIndex = 1; }
    if (n < 1) { slideIndex = slides.length; }
    for (i = 0; i < slides.length; i++) {
      slides[i].style.display = 'none';
    }
    for (i = 0; i < dots.length; i++) {
      dots[i].className = dots[i].className.replace(' active', '');
    }
    slides[slideIndex - 1].style.display = 'block';
    dots[slideIndex - 1].className += ' active';
  }

</script>
</body>
</html>
